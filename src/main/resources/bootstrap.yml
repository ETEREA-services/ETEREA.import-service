app:
  port: ${APP_PORT:8280}
  logging: debug
  consul:
    host: consul-service
    port: 8500
  server: 10.147.20.25:3306
  database: tsa.agencia.migracion
  user: root
  password: root
  ftp-host: 127.0.0.1
  ftp-user: ftp-uid
  ftp-password: pwd
  ftp-timeout: 60000
  hours-offset: 1
  local-path: /tmp/
  wordpress:
    export-recheck-days: ${WORDPRESS_EXPORT_RECHECK_DAYS:2}
    export-feed-cron: ${WORDPRESS_EXPORT_FEED_CRON:0 */5 * * * *}
    site:
      name: termascacheuta
      base-url: ${WORDPRESS_API_BASE_URL:http://10.147.21.140:8081/api/v1}
      username: ${WORDPRESS_SITE_USERNAME:}
      password: ${WORDPRESS_SITE_PASSWORD:}

server:
  port: ${app.port}

spring:
  application:
    name: import-service
  cloud:
    consul:
      host: ${app.consul.host}
      port: ${app.consul.port}
      discovery:
        prefer-ip-address: true
        tags: eterea,import
  datasource:
    url: jdbc:mysql://${app.server}/${app.database}?useSSL=false&serverTimezone=UTC
    username: ${app.user}
    password: ${app.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  security:
    user:
      name: admin
      password: admin

logging:
  level:
    eterea.migration.rest: ${app.logging}
    web: ${app.logging}
    org:
      hibernate:
        SQL: ${app.logging-sql:warn}
      springframework.cloud.config: ${app.logging}
